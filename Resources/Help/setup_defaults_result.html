<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Mountea Dialogue System - Setup Defaults</title>
	<link rel="stylesheet" href="DialogueEditorHelp.css?v=help-ui-20260421b" />
</head>
<body class="setup-page-body help-page-body--fullscreen">
	<section class="doc-page setup-page help-fullscreen-page">
		<header class="setup-header">
			<h1>Setup Defaults</h1>
			<div class="setup-chip-row ui-chip-row">
				<span class="setup-chip ui-chip setup-chip--gamemode">GameMode: __MDS_GAMEMODE_CLASS__</span>
				<span class="setup-chip ui-chip __MDS_STATUS_CHIP_CLASS__">__MDS_STATUS_CHIP_TEXT__</span>
			</div>
		</header>

		<section class="card setup-results">
			<div class="setup-table-scroll ui-scroll-y">
				<table class="setup-table">
					<colgroup>
						<col class="col-role" />
						<col class="col-class" />
						<col class="col-status" />
						<col class="col-details" />
					</colgroup>
					<thead>
						<tr>
							<th>Role</th>
							<th>Class</th>
							<th>Status</th>
							<th>Details</th>
						</tr>
					</thead>
					<tbody>
						__MDS_STATUS_ROWS__
					</tbody>
				</table>
			</div>
		</section>

		<section class="card setup-summary">
			<p class="setup-summary-message __MDS_SUMMARY_CLASS__">__MDS_SUMMARY_MESSAGE__</p>
		</section>

		<section class="card setup-actions">
			<div class="setup-action-row ui-action-row">
				__MDS_EXAMPLE_LEVEL_BUTTON__
				<a class="setup-action ui-action" href="#" data-mds-type="external" data-mds-target="https://discord.gg/c2WQ658V44">Support Discord</a>
				<a class="setup-action ui-action setup-action--close ui-action--close" href="#" data-mds-type="close" data-mds-target="">Close</a>
			</div>
		</section>
	</section>
</body>
</html>
